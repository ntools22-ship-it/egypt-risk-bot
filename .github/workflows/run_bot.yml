name: Egypt Risk Radar Bot

on:
  schedule:
    # كل 15 دقيقة — أخبار فورية
    - cron: '*/15 * * * *'
    # موجز يومي 8 صباحاً بتوقيت مصر (6 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'news'
        type: choice
        options:
          - news
          - digest

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 6 * * *" ]; then
            echo "mode=digest" >> $GITHUB_OUTPUT
          else
            echo "mode=news" >> $GITHUB_OUTPUT
          fi

      - name: Run bot
        env:
          BOT_TOKEN:      ${{ secrets.BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
          RUN_MODE:       ${{ steps.mode.outputs.mode }}
        run: python bot.py
