name: Risk Radar Bot

on:
  schedule:
    - cron: '0 * * * *' # سيتم التشغيل تلقائياً كل ساعة
  workflow_dispatch: # يتيح لك التشغيل اليدوي بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest
    
    # إضافة صلاحيات المحتوى لضمان قدرة البوت على القراءة والكتابة إذا لزم الأمر
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        # استخدام سطر الأوامر لتشغيل الملف مع ضمان عدم توقف الـ Workflow فجأة
        run: python bot.py
