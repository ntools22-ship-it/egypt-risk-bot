name: Egypt Risk Radar Bot

on:
  schedule:
    # كل ساعة من 7 صبح لـ 9 مساءً بتوقيت مصر (5-19 UTC)
    - cron: '0 5-19 * * *'
    # موجز يومي 10 مساءً بتوقيت مصر (20 UTC)
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'news'
        type: choice
        options:
          - news
          - digest

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install cloudscraper feedparser requests beautifulsoup4 supabase groq

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 20 * * *" ]; then
            echo "mode=digest" >> $GITHUB_OUTPUT
          else
            echo "mode=news" >> $GITHUB_OUTPUT
          fi

      - name: Run bot
        env:
          BOT_TOKEN:      ${{ secrets.BOT_TOKEN }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
          RUN_MODE:       ${{ steps.mode.outputs.mode }}
        run: python bot.py
